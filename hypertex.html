<!DOCTYPE html>
<html>
<head>
    <title>Registration Form with Audio & Video</title>

    <link rel="stylesheet" href="styles.css">
</head>

<body>

<div class="form-container">

    <h2>Registration Form</h2>

    <form>

        <label>Full Name:</label>
        <input type="text" placeholder="Enter your name">

        <label>Email:</label>
        <input type="email" placeholder="Enter your email">

        <label>Password:</label>
        <input type="password" placeholder="Enter your password">

        <label>Contact No:</label>
        <input type="tel" placeholder="Enter contact number">

        <label>Address:</label>
        <textarea rows="4" placeholder="Enter your address"></textarea>

        <label>State:</label>
        <select>
            <option>Select State</option>
            <option>Gujarat</option>
            <option>Maharashtra</option>
            <option>Rajasthan</option>
            <option>Delhi</option>
        </select>

        <label>Gender:</label><br>

        <input type="radio" name="gender" class="gender"> Male
        <input type="radio" name="gender" class="gender"> Female
        <input type="radio" name="gender" class="gender"> Other

        <br><br>

        <label>Hobbies:</label><br>

        <input type="checkbox" class="hobby"> Reading <br>
        <input type="checkbox" class="hobby"> Gaming <br>
        <input type="checkbox" class="hobby"> Watching Movies <br>
        <input type="checkbox" class="hobby"> Listening Music

        <br><br>

        <!-- Real Audio -->
        <label>Sample Audio:</label>

        <audio controls>
            <source src="https://www.w3schools.com/html/horse.mp3" type="audio/mp3">
            Your browser does not support audio.
        </audio>

        <!-- Real Video -->
        <label>Sample Video:</label>

        <video controls>
            <source src="https://www.w3schools.com/html/mov_bbb.mp4" type="video/mp4">
            Your browser does not support video.
        </video>

        <button type="submit">Register</button>

    </form>

</div>

</body>
</html>
