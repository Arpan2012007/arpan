
<!DOCTYPE html>
<html>
<head>
    <title>Registration Form</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #f2f2f2;

            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        .form-container {
            background-color: white;
            width: 400px;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0px 0px 10px gray;
        }

        h2 {
            text-align: center;
            color: darkblue;
        }

        label {
            font-weight: bold;
        }

        input,
        textarea,
        select {
            width: 100%;
            padding: 8px;
            margin-top: 5px;
            margin-bottom: 15px;
            border: 1px solid gray;
            border-radius: 5px;
        }

        .gender,
        .hobby {
            width: auto;
        }

        button {
            width: 100%;
            padding: 10px;
            background-color: green;
            color: white;
            border: none;
            border-radius: 5px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: darkgreen;
        }
    </style>
</head>

<body>

<div class="form-container">

    <h2>Registration Form</h2>

    <form>

        <label>Full Name:</label>
        <input type="text" placeholder="Enter your name">

        <label>Email:</label>
        <input type="email" placeholder="Enter your email">

        <label>Password:</label>
        <input type="password" placeholder="Enter your password">

        <label>Contact No:</label>
        <input type="tel" placeholder="Enter contact number">

        <label>Address:</label>
        <textarea rows="4" placeholder="Enter your address"></textarea>

        <label>State:</label>
        <select>
            <option>Select State</option>
            <option>Gujarat</option>
            <option>Maharashtra</option>
            <option>Rajasthan</option>
            <option>Delhi</option>
        </select>

        <label>Gender:</label><br>

        <input type="radio" name="gender" class="gender"> Male
        <input type="radio" name="gender" class="gender"> Female
        <input type="radio" name="gender" class="gender"> Other

        <br><br>

        <label>Hobbies:</label><br>

        <input type="checkbox" class="hobby"> Reading <br>
        <input type="checkbox" class="hobby"> Gaming <br>
        <input type="checkbox" class="hobby"> Watching Movies <br>
        <input type="checkbox" class="hobby"> Listening Music

        <br><br>

        <button type="submit">Register</button>

    </form>

</div>

</body>
</html>
